<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demande de devis - RemapAuto AI</title>

<style>

body{

    font-family:Arial,sans-serif;

    background:#111;

    color:white;

    margin:0;

}

.container{

    max-width:700px;

    margin:40px auto;

    padding:30px;

    background:#1b1b1b;

    border-radius:15px;

    box-shadow:0 0 20px rgba(255,0,0,.3);

}

h1{

    color:#ff2b2b;

    text-align:center;

}

input,select,textarea{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:none;

    border-radius:8px;

    background:#2a2a2a;

    color:white;

    font-size:16px;

}

button{

    width:100%;

    padding:15px;

    background:#ff2b2b;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#d80000;

}

</style>

</head>

<body>

<div class="container">

<h1>🚗 Demande de devis</h1>

<form action="https://formsubmit.co/remapauto@gmail.com" method="POST">

<input type="text" name="Nom" placeholder="Nom complet" required>

<input type="email" name="Email" placeholder="Adresse e-mail" required>

<input type="tel" name="Téléphone" placeholder="Téléphone">

<input type="text" name="Marque" placeholder="Marque du véhicule">

<input type="text" name="Modèle" placeholder="Modèle">

<input type="number" name="Année" placeholder="Année">

<select name="Service">

<option>Stage 1</option>

<option>Stage 2</option>

<option>E85</option>

<option>DPF OFF</option>

<option>EGR OFF</option>

<option>AdBlue OFF</option>

<option>Diagnostic</option>

<option>Autre</option>

</select>

<textarea name="Message" rows="6" placeholder="Décrivez votre demande"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">

Envoyer ma demande de devis

</button>

</form>

</div>

</body>

</html>
